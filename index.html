<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loan Tracker</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; }
    input, button { padding: 10px; margin-top: 10px; width: 100%; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; }
    button.delete { background: #ff4d4d; color: white; border: none; cursor: pointer; }
    .section { margin-top: 15px; }
    .motivation, .savings { margin-top: 10px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Loan Tracker</h2>

    <div class="section">
      <p><strong>Loan:</strong> $16,500 @ 14.90% APR</p>
      <p><strong>Term:</strong> 96 Months</p>
      <p><strong>Monthly Payment:</strong> $295.35</p>
      <p><strong>Total If Minimum Paid:</strong> $<span id="totalPaid"></span></p>
      <p><strong>Total Interest (Full Term):</strong> $<span id="totalInterest"></span></p>
    </div>

    <div class="section">
      <p><strong>Remaining Balance:</strong> $<span id="balance">0</span></p>
      <p><strong>Payments Made:</strong> <span id="count">0</span> / 96</p>
      <p><strong>Total You've Paid:</strong> $<span id="paidSoFar">0</span></p>
    </div>

    <div class="motivation" id="motivation"></div>
    <div class="savings" id="savings"></div>

    <input type="number" id="payment" placeholder="Enter payment amount">
    <button onclick="makePayment()">Submit Payment</button>

    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Payment</th>
          <th>Interest</th>
          <th>Principal</th>
          <th>Balance</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="history"></tbody>
    </table>
  </div>

  <script>
    const principalStart = 16500;
    const monthlyRate = 0.149 / 12;
    const payment = 295.35;
    const term = 96;

    let data = JSON.parse(localStorage.getItem('loanData')) || { payments: [] };

    function save() {
      localStorage.setItem('loanData', JSON.stringify(data));
    }

    function calcFullSchedule() {
      let balance = principalStart;
      let totalInterest = 0;

      for (let i = 0; i < term; i++) {
        let interest = balance * monthlyRate;
        let principal = payment - interest;
        balance -= principal;
        totalInterest += interest;
      }

      return {
        totalInterest,
        totalPaid: payment * term
      };
    }

    function render() {
      const tbody = document.getElementById('history');
      tbody.innerHTML = '';

      let balance = principalStart;
      let totalPaid = 0;
      let totalInterest = 0;

      data.payments.forEach((p, i) => {
        let interest = balance * monthlyRate;
        let principal = p.amount - interest;
        balance -= principal;
        totalPaid += p.amount;
        totalInterest += interest;

        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${i + 1}</td>
          <td>$${p.amount.toFixed(2)}</td>
          <td>$${interest.toFixed(2)}</td>
          <td>$${principal.toFixed(2)}</td>
          <td>$${Math.max(0, balance).toFixed(2)}</td>
          <td><button class="delete" onclick="deletePayment(${i})">X</button></td>
        `;
        tbody.appendChild(row);
      });

      const full = calcFullSchedule();
      let saved = Math.max(0, full.totalInterest - totalInterest);

      if (data.payments.length === 0 || totalInterest >= full.totalInterest) {
        saved = 0;
      }

      const percent = ((principalStart - balance) / principalStart) * 100;

      document.getElementById('balance').innerText = Math.max(0, balance).toFixed(2);
      document.getElementById('count').innerText = data.payments.length;
      document.getElementById('paidSoFar').innerText = totalPaid.toFixed(2);

      document.getElementById('totalPaid').innerText = full.totalPaid.toFixed(2);
      document.getElementById('totalInterest').innerText = full.totalInterest.toFixed(2);

      document.getElementById('motivation').innerText = percent >= 100
        ? "PAID OFF 🎉"
        : percent > 50
        ? "Over halfway 🚀"
        : "Keep going 💪";

      document.getElementById('savings').innerText = saved > 0
        ? `Interest saved: $${saved.toFixed(2)} 💰`
        : `No savings yet — beat $295.35 👀`;

      save();
    }

    function makePayment() {
      const val = parseFloat(document.getElementById('payment').value);
      if (!val || val <= 0) return alert('Enter valid payment');
      data.payments.push({ amount: val });
      document.getElementById('payment').value = '';
      render();
    }

    function deletePayment(i) {
      data.payments.splice(i, 1);
      render();
    }

    render();
  </script>
</body>
</html>
